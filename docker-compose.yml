version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8020:8020"
    environment:
      - BROKER_MODE=mock
      - TRADING_ENABLED=false
      - DEBUG=true
      - DATABASE_URL=sqlite+aiosqlite:///data/moomoo_alpha.db
      - LOG_LEVEL=INFO
    volumes:
      - backend_data:/app/data
      - ./backend/.env:/app/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8020
      - NEXT_PUBLIC_WS_URL=ws://backend:8020/api/v1/ws
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
